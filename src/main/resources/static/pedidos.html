<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexa - Nuevo Pedido</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body{
            background:#f4f6f9;
        }

        .brand{
            font-weight:700;
            letter-spacing:1px;
            font-size:22px;
        }

        .card{
            border-radius:1rem;
            box-shadow:0 10px 20px rgba(0,0,0,.08);
        }

        .table thead{
            background:#212529;
            color:white;
        }

        .total-box{
            font-size:22px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">

    <div class="container">

        <span class="navbar-brand brand">
            VOLGA
        </span>

        <span class="text-white">
            Nuevo Pedido
        </span>

        <div>

            <a href="dashboard.html"
               class="btn btn-outline-light btn-sm me-2">
                Dashboard
            </a>

            <a href="historial-pedidos.html"
               class="btn btn-outline-light btn-sm me-2">
                Historial
            </a>

            <a href="productos.html"
               class="btn btn-outline-light btn-sm">
                Productos
            </a>

        </div>

    </div>

</nav>

<div class="container">

    <div class="card p-4">

        <h4 class="mb-4">
            Seleccionar productos
        </h4>

        <div class="row mb-3">

            <div class="col-md-4">

                <input
                        type="text"
                        id="filtroProductos"
                        class="form-control"
                        placeholder="Buscar producto..."
                        onkeyup="filtrarProductos()">

            </div>

        </div>

        <table class="table table-hover">

            <thead>

            <tr>

                <th></th>

                <th>Producto</th>

                <th>Precio</th>

                <th>Cantidad</th>

                <th>Subtotal</th>

            </tr>

            </thead>

            <tbody id="tabla"></tbody>

        </table>

        <div class="row mt-4 align-items-end">

            <div class="col-md-4">

                <label class="form-label fw-bold">
                    Método de pago
                </label>

                <select id="metodoPago" class="form-select">

                    <option value="">
                        Seleccione...
                    </option>

                    <option value="EFECTIVO">
                        Efectivo
                    </option>

                    <option value="MP_TRANSFERENCIA">
                        Mercado Pago / Transferencia
                    </option>

                </select>

            </div>

            <div class="col-md-4"
                 id="dniContainer"
                 style="display:none;">

                <label class="form-label fw-bold">
                    DNI Cliente (opcional)
                </label>

                <input
                        type="text"
                        id="dniCliente"
                        class="form-control"
                        placeholder="Ingrese DNI">

            </div>

            <div class="col-md-2">

                <div class="total-box">

                    Total:
                    $

                    <span id="total">
                        0
                    </span>

                </div>

            </div>

            <div class="col-md-2 text-end">

                <button
                        class="btn btn-success w-100"
                        onclick="guardarPedido()">

                    Guardar Pedido

                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/pedidos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
