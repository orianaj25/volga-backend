<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | NEXA</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="layout">

    <!-- ========================= -->
    <!-- SIDEBAR                   -->
    <!-- ========================= -->

    <aside class="sidebar">

        <div>

            <div class="sidebar-header">

                <h2>NEXA</h2>

                <span>Sistema de Gestión Comercial</span>

            </div>

            <nav class="sidebar-menu">

                <ul>

                    <li>
                        <a href="dashboard.html" class="active">
                            <i class="bi bi-grid-fill"></i>
                            Dashboard
                        </a>
                    </li>

                    <li>
                        <a href="pedidos.html">
                            <i class="bi bi-cart-fill"></i>
                            Pedidos
                        </a>
                    </li>

                    <li>
                        <a href="productos.html">
                            <i class="bi bi-box-seam"></i>
                            Productos
                        </a>
                    </li>

                    <li>
                        <a href="historial-pedidos.html">
                            <i class="bi bi-clock-history"></i>
                            Historial de Pedidos
                        </a>
                    </li>

                    <li>
                        <a href="arqueo.html">
                            <i class="bi bi-cash-coin"></i>
                            Arqueo de Caja
                        </a>
                    </li>

                    <li>
                        <a href="historial-cajas.html">
                            <i class="bi bi-archive-fill"></i>
                            Historial de Cajas
                        </a>
                    </li>

                </ul>

            </nav>

        </div>

        <div class="sidebar-footer">

            <a href="#">
                <i class="bi bi-box-arrow-left"></i>

            </a>

        </div>

    </aside>

    <!-- ========================= -->
    <!-- MAIN                      -->
    <!-- ========================= -->

    <div class="main">

        <!-- ========================= -->
        <!-- TOPBAR                    -->
        <!-- ========================= -->

        <header class="topbar">

            <div class="topbar-left">

                <h3>¡Bienvenido!</h3>



            </div>

            <div class="topbar-right">

    <span id="fechaActual">
        <i class="bi bi-calendar3"></i>
    </span>

                <i class="bi bi-bell-fill"></i>

            </div>

        </header>

        <!-- ========================= -->
        <!-- CONTENIDO                 -->
        <!-- ========================= -->

        <main class="content">

            <!-- Aquí irán las tarjetas -->

            <section class="cards-container">

                <div class="card">

                    <div class="card-icon green">
                        <i class="bi bi-currency-dollar"></i>
                    </div>

                    <div class="card-info">

                        <div class="card-title">
                            Ventas del día
                        </div>

                        <div class="card-value" id="ventasDia">

                        </div>

                        <div class="card-growth">

                        </div>

                    </div>

                </div>

                <div class="card">

                    <div class="card-icon blue">
                        <i class="bi bi-clipboard-check"></i>
                    </div>

                    <div class="card-info">

                        <div class="card-title">
                            Pedidos del día
                        </div>

                        <div class="card-value" id="pedidosDia">

                        </div>

                        <div class="card-growth">

                        </div>

                    </div>

                </div>

                <div class="card">

                    <div class="card-icon purple">
                        <i class="bi bi-people-fill"></i>
                    </div>

                    <div class="card-info">

                        <div class="card-title">
                            Clientes atendidos
                        </div>

                        <div class="card-value" id="clientesDia">

                        </div>

                        <div class="card-growth">

                        </div>

                    </div>

                </div>

                <div class="card">

                    <div class="card-icon orange">
                        <i class="bi bi-box-seam"></i>
                    </div>

                    <div class="card-info">

                        <div class="card-title">
                            Productos vendidos
                        </div>

                        <div class="card-value" id="productosDia">

                        </div>

                        <div class="card-growth">

                        </div>

                    </div>

                </div>

            </section>

            <!-- Aquí irá gráfico + accesos -->

            <section class="dashboard-middle">

                <!-- Ventas últimos 7 días -->
                <div class="chart-card">

                    <div class="card-header">
                        <h3>Ventas últimos 7 días</h3>
                    </div>

                    <canvas id="ventasChart"></canvas>

                </div>

                <!-- Accesos rápidos (luego reemplazará inventario) -->
                <div class="quick-actions">

                    <h3>Acciones rápidas</h3>

                    <a href="pedidos.html" class="action-btn primary">
                        <i class="bi bi-plus-circle"></i>
                        Crear Pedido
                    </a>

                    <a href="historial-pedidos.html">
                        <i class="bi bi-list"></i>
                        Ver Pedidos
                    </a>

                </div>

            </section>

            <!-- Aquí irán las tablas -->

            <section class="dashboard-bottom">

            </section>

        </main>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- JavaScript del dashboard -->
<script src="js/dashboard.js"></script>

</body>
</html>
