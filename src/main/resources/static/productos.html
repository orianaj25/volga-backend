<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NEXA - Productos</title>


    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">


    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <!-- Librería Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


    <!-- CSS -->
    <link rel="stylesheet" href="css/dashboard.css">


</head>


<body>


<nav class="navbar navbar-dark bg-dark mb-4">

    <div class="container">

        <span class="navbar-brand brand">

            NEXA

        </span>


        <div>

            <a
                    href="dashboard.html"
                    class="btn btn-outline-light btn-sm">

                Dashboard

            </a>


            <a
                    href="pedidos.html"
                    class="btn btn-outline-light btn-sm">

                Pedidos

            </a>


        </div>


    </div>

</nav>




<div class="container">


    <div class="row g-4">



        <!-- FORMULARIO -->


        <div class="col-lg-4">


            <div class="card p-4">


                <h5 id="tituloForm"
                    class="mb-3">

                    Nuevo Producto

                </h5>



                <input
                        id="nombre"
                        class="form-control mb-3"
                        placeholder="Nombre del producto">



                <input
                        id="costo"
                        type="number"
                        step="0.01"
                        class="form-control mb-3"
                        placeholder="Costo">



                <input
                        id="precio"
                        type="number"
                        step="0.01"
                        class="form-control mb-3"
                        placeholder="Precio de venta">





                <label class="form-label">

                    Tipo de venta

                </label>




                <select
                        id="tipoVenta"
                        class="form-select mb-4">


                    <option value="UNIDAD">

                        Por unidad

                    </option>


                    <option value="KILOGRAMO">

                        Por kilogramo

                    </option>


                </select>




                <button
                        onclick="guardar()"
                        class="btn btn-primary w-100">

                    Guardar

                </button>




                <button
                        id="cancelarBtn"
                        onclick="cancelar()"
                        class="btn btn-secondary w-100 mt-2 d-none">

                    Cancelar

                </button>



            </div>


        </div>





        <!-- LISTADO -->


        <div class="col-lg-8">



            <div class="card p-4">



                <h5 class="mb-3">

                    Productos

                </h5>





                <!-- BUSCADOR -->


                <input
                        id="filtro"
                        class="form-control mb-3"
                        placeholder="Buscar producto..."
                        onkeyup="filtrarProductos()">





                <!-- IMPORTAR EXCEL -->


                <div class="row g-2 mb-3">



                    <div class="col-md-6">


                        <input
                                type="file"
                                id="archivoExcel"
                                class="form-control"
                                accept=".xlsx,.xls">


                    </div>




                    <div class="col-md-3">


                        <button
                                class="btn btn-success w-100"
                                onclick="importarExcel()">


                            📥 Importar


                        </button>


                    </div>





                    <div class="col-md-3">


                        <button
                                class="btn btn-outline-primary w-100"
                                onclick="descargarPlantilla()">



                            📄 Plantilla



                        </button>


                    </div>



                </div>





                <div
                        id="resultadoImportacion"
                        class="mb-3">


                </div>







                <!-- TABLA -->



                <div class="table-responsive">



                    <table class="table table-hover align-middle">



                        <thead>


                        <tr>


                            <th>

                                Nombre

                            </th>



                            <th>

                                Costo

                            </th>



                            <th>

                                Precio

                            </th>



                            <th>

                                Tipo de venta

                            </th>



                            <th width="170">

                                Acciones

                            </th>



                        </tr>


                        </thead>




                        <tbody id="tabla">


                        </tbody>



                    </table>



                </div>




            </div>



        </div>




    </div>



</div>




<script src="js/productos.js"></script>



</body>


</html>
