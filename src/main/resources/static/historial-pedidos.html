<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VOLGA - Historial de Pedidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body{
            background:#f4f6f9;
        }

        .brand{
            font-weight:700;
            letter-spacing:1px;
            font-size:22px;
        }

        .card{
            border-radius:1rem;
            box-shadow:0 10px 20px rgba(0,0,0,.08);
        }

        .table thead{
            background:#212529;
            color:white;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand brand">VOLGA</span>

        <span class="text-white">
            Historial de Pedidos
        </span>

        <div>
            <a href="pedidos.html" class="btn btn-outline-light btn-sm me-2">
                Nuevo Pedido
            </a>

            <a href="productos.html" class="btn btn-outline-light btn-sm">
                Productos
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <div class="card p-3">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h4 class="mb-0">
                Historial de Pedidos
            </h4>

        </div>

        <div class="row mb-3">

            <div class="col-md-4">

                <input
                        type="text"
                        id="filtro"
                        class="form-control"
                        placeholder="Buscar por pedido, fecha o método de pago..."
                        onkeyup="filtrarDetalle()">

            </div>

        </div>

        <table class="table table-striped table-hover">

            <thead>

            <tr>

                <th>Pedido</th>

                <th>Fecha</th>

                <th>Productos</th>

                <th>Total</th>

                <th>Método de pago</th>

                <th>Acciones</th>

            </tr>

            </thead>

            <tbody id="tablaDetalle"></tbody>

        </table>

    </div>

</div>

<!-- MODAL -->

<div class="modal fade" id="modalPedido" tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Pedido #
                    <span id="modalId"></span>

                </h5>

                <button
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <p>
                    <b>Fecha:</b>
                    <span id="modalFecha"></span>
                </p>

                <p>
                    <b>Total:</b>
                    $
                    <span id="modalTotal"></span>
                </p>

                <p>
                    <b>Método de pago:</b>
                    <span id="modalPago"></span>
                </p>

                <table class="table table-bordered">

                    <thead>

                    <tr>

                        <th>Producto</th>

                        <th>Cantidad</th>

                        <th>Precio</th>

                        <th>Subtotal</th>

                    </tr>

                    </thead>

                    <tbody id="modalItems"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="js/historial-pedidos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
